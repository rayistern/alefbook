<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=576">
<title>Page 1 — Front Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* @font-face — only fonts used on this page */
  @font-face {
    font-family: 'Yiddishkeit';
    src: url('../../../Document fonts/Yiddishkeit 2.0 AAA Black.otf') format('opentype');
    font-weight: 900;
  }
  @font-face {
    font-family: 'Fredoka One';
    src: url('../../../Document fonts/FredokaOne-Regular.otf') format('opentype');
    font-weight: 400;
  }

  /* Colors — converted from IDML CMYK swatches
     R = 255*(1-C)*(1-K), G = 255*(1-M)*(1-K), B = 255*(1-Y)*(1-K) */
  :root {
    --color-mainHebrew: #095354;  /* CMYK(89,1,0,67) — teal for titles */
  }

  .bleed-wrapper {
    width: 576px;
    height: 576px;
    overflow: hidden;
    position: relative;
  }

  .page {
    width: 540px;
    height: 540px;
    position: relative;
    margin: 18px;
    overflow: hidden;
  }

  /* Background extends into bleed */
  .bg-bleed {
    position: absolute;
    left: 0;
    top: 0;
    width: 576px;
    height: 576px;
    z-index: 0;
  }
  .bg-bleed img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .el {
    position: absolute;
  }

  .hebrew-text {
    direction: rtl;
    unicode-bidi: embed;
  }

  .english-text {
    direction: ltr;
    unicode-bidi: embed;
  }
</style>
</head>
<body>
<div class="bleed-wrapper">
  <!-- Background parchment extends into bleed area -->
  <div class="bg-bleed">
    <img src="../../../images/LB1A.jpg" alt="Parchment background" />
  </div>

  <div class="page" id="page-001" data-page-number="1" data-section="cover" data-is-fixed-liturgy="false">

    <!-- ======================================================
         Matzah images (Asset 5matzawhole.png)
         3 matzahs at various positions and rotations
         ====================================================== -->

    <!-- Matzah u3317: no rotation, left side
         Spread center (-292, -58.4) → page px (150.7, 192.2)
         Local size 185×185.7 pt = 246.7×247.6 px -->
    <div class="el" style="
      left: 27px; top: 68px;
      width: 247px; height: 248px;
      z-index: 2;
    ">
      <img src="../../../images/Asset 5matzawhole.png" alt="Matzah"
        style="width: 100%; height: 100%; object-fit: contain;" />
    </div>

    <!-- Matzah u3312: rotated 55.5°, upper-left
         Spread center (-263.9, -96.4) → page px (188.1, 141.4) -->
    <div class="el" style="
      left: 65px; top: 18px;
      width: 247px; height: 248px;
      z-index: 3;
      transform: rotate(55.5deg);
    ">
      <img src="../../../images/Asset 5matzawhole.png" alt="Matzah rotated"
        style="width: 100%; height: 100%; object-fit: contain;" />
    </div>

    <!-- Matzah u330b: rotated −90.2°, upper-right
         Spread center (-157.3, -114.5) → page px (330.2, 117.4) -->
    <div class="el" style="
      left: 207px; top: -6px;
      width: 247px; height: 248px;
      z-index: 4;
      transform: rotate(-90.2deg);
    ">
      <img src="../../../images/Asset 5matzawhole.png" alt="Matzah rotated"
        style="width: 100%; height: 100%; object-fit: contain;" />
    </div>

    <!-- ======================================================
         Cup images (Asset 4cup.png)
         5 cups scattered in the middle area
         ====================================================== -->

    <!-- Cup u3358: spread center (-185.7, 47.7) → page px (292.5, 338.5) -->
    <div class="el" style="
      left: 225px; top: 167px;
      width: 135px; height: 343px;
      z-index: 5;
    ">
      <img src="../../../images/Asset 4cup.png" alt="Kiddush cup"
        style="width: 100%; height: 100%; object-fit: contain;" />
    </div>

    <!-- Cup u335b: spread center (-185.7, 47.7) → page px (292.5, 329.2) -->
    <div class="el" style="
      left: 225px; top: 158px;
      width: 135px; height: 342px;
      z-index: 6;
    ">
      <img src="../../../images/Asset 4cup.png" alt="Kiddush cup"
        style="width: 100%; height: 100%; object-fit: contain;" />
    </div>

    <!-- Cup u3321: spread center (-146.4, 49.7) → page px (344.9, 336.3) -->
    <div class="el" style="
      left: 278px; top: 170px;
      width: 135px; height: 333px;
      z-index: 7;
    ">
      <img src="../../../images/Asset 4cup.png" alt="Kiddush cup"
        style="width: 100%; height: 100%; object-fit: contain;" />
    </div>

    <!-- Cup u331c: spread center (-92.8, 46.2) → page px (416.3, 331.6) -->
    <div class="el" style="
      left: 349px; top: 165px;
      width: 135px; height: 333px;
      z-index: 8;
    ">
      <img src="../../../images/Asset 4cup.png" alt="Kiddush cup"
        style="width: 100%; height: 100%; object-fit: contain;" />
    </div>

    <!-- Cup u3325: spread center (-34.6, 56.7) → page px (493.8, 345.6) -->
    <div class="el" style="
      left: 427px; top: 179px;
      width: 135px; height: 333px;
      z-index: 9;
    ">
      <img src="../../../images/Asset 4cup.png" alt="Kiddush cup"
        style="width: 100%; height: 100%; object-fit: contain;" />
    </div>

    <!-- ======================================================
         Hebrew title "הגדה של פסח"
         Story u332d — Yiddishkeit 2.0 AAA Black, 50pt, center-aligned
         Spread center (-191.0, 101.6) → page px (276.0, 384.0)
         ====================================================== -->
    <div class="el hebrew-text" style="
      left: 153px; top: 357px;
      width: 246px; height: 53px;
      z-index: 40;
      text-align: center;
      font-family: 'Yiddishkeit', serif;
      font-weight: 900;
      font-size: 66.7px;
      color: var(--color-mainHebrew);
      line-height: 53px;
      white-space: nowrap;
    ">הגדה של פסח</div>

    <!-- ======================================================
         English title "My Passover Haggadah"
         Story u3344 — Fredoka One Regular, 28pt, center-aligned
         Spread center (-120.2, 141.6) → page px (276.0, 437.3)
         ====================================================== -->
    <div class="el english-text" style="
      left: 59px; top: 411px;
      width: 435px; height: 53px;
      z-index: 41;
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-weight: 400;
      font-size: 37.3px;
      color: var(--color-mainHebrew);
      line-height: 53px;
    ">My Passover Haggadah</div>

  </div>
</div>
</body>
</html>
