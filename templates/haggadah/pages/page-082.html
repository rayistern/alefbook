<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Page 82 — Back Cover [PLACEHOLDER]</title>
<style>
  :root {
    --color-bg:     #1a0a00;
    --color-gold:   #cf9f32;
    --color-cream:  #fff8ee;
    --font-hebrew:  'Adobe Hebrew', serif;
    --font-english: 'DIN Next LT Pro', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .bleed-wrapper {
    width: 576px; height: 576px;
    padding: 18px;
    background: var(--color-bg);
    overflow: hidden;
  }

  .page {
    width: 540px; height: 540px;
    position: relative;
    background: var(--color-bg);
    overflow: hidden;
  }

  .image-slot {
    position: absolute;
    left: 0; top: 0;
    width: 540px; height: 540px;
  }
  .image-slot img { width:100%; height:100%; object-fit:cover; display:block; }
  .image-slot-placeholder {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    background:#2a1500; color:#888;
    font-family: sans-serif; font-size:14px;
    flex-direction:column; gap:8px;
  }
  .image-slot-placeholder::before { content:"📷"; font-size:32px; }
  .image-slot img[src=""] ~ .image-slot-placeholder,
  .image-slot img:not([src]) ~ .image-slot-placeholder { display:flex; }
  .image-slot img[src]:not([src=""]) ~ .image-slot-placeholder { display:none; }

  .cover-overlay {
    position:absolute; left:0; top:0; right:0; bottom:0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 60%);
    z-index:2;
  }

  .back-cover-text {
    position:absolute; left:20px; bottom:40px; width:500px;
    text-align:center; z-index:3;
    font-family: var(--font-hebrew);
    font-size:20px; color:var(--color-gold);
    direction:rtl;
  }

  .placeholder-notice {
    position:absolute; top:4px; left:50%; transform:translateX(-50%);
    background:rgba(255,165,0,0.85); color:#000;
    font-family:monospace; font-size:9px;
    padding:2px 6px; border-radius:3px; z-index:99; white-space:nowrap;
  }
</style>
</head>
<body>
<div class="bleed-wrapper">
<div class="page" id="page-082"
  data-page-number="82"
  data-section="back-cover"
  data-is-fixed-liturgy="false">

  <div class="placeholder-notice">⚠ PLACEHOLDER — Replace with IDML back cover conversion</div>

  <div class="image-slot"
    data-slot-id="back-cover"
    data-slot-label="Back Cover Photo">
    <img src="" alt="Back cover photo" />
    <div class="image-slot-placeholder">Add your back cover photo here</div>
  </div>

  <div class="cover-overlay"></div>

  <div class="back-cover-text">
    לְשָׁנָה הַבָּאָה בִּירוּשָׁלַיִם
  </div>

</div>
</div>
</body>
</html>
