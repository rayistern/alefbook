<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --primary-color: #8B4513;
    --secondary-color: #DAA520;
    --background-color: #FDF5E6;
    --text-color: #2C1810;
    --font-hebrew: 'David Libre', 'Frank Ruhl Libre', serif;
    --font-english: 'EB Garamond', 'Georgia', serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .page {
    width: 540px;
    height: 540px;
    padding: 18px;
    background: var(--background-color);
    position: relative;
    overflow: hidden;
  }
  .page-content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 3px double var(--secondary-color);
    padding: 40px;
  }
  .back-title {
    font-family: var(--font-english);
    font-size: 20px;
    color: var(--text-color);
    margin-bottom: 16px;
  }
  .back-subtitle {
    font-family: var(--font-english);
    font-size: 14px;
    color: var(--text-color);
    opacity: 0.6;
  }
  .image-slot {
    width: 200px;
    height: 200px;
    border: 2px dashed var(--secondary-color);
    margin: 24px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--secondary-color);
    font-size: 14px;
    font-family: var(--font-english);
    direction: ltr;
  }
</style>
</head>
<body>
<div class="page" data-page-number="82">
  <div class="page-content">
    <div class="image-slot" data-slot-id="back-photo">Back Cover Photo</div>
    <div class="back-title">Made with AlefBook</div>
    <div class="back-subtitle">alefbook.org</div>
  </div>
</div>
</body>
</html>
