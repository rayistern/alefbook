<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --primary-color: #8B4513;
    --secondary-color: #DAA520;
    --background-color: #FDF5E6;
    --text-color: #2C1810;
    --font-hebrew: 'David Libre', 'Frank Ruhl Libre', serif;
    --font-english: 'EB Garamond', 'Georgia', serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .page {
    width: 540px;
    height: 540px;
    padding: 18px;
    background: var(--background-color);
    position: relative;
    overflow: hidden;
    font-family: var(--font-hebrew);
  }
  .page-content {
    width: 100%;
    height: 100%;
    padding: 24px;
  }
  .section-title {
    font-size: 24px;
    color: var(--primary-color);
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .hebrew-text {
    font-size: 18px;
    color: var(--text-color);
    line-height: 1.8;
    margin-bottom: 12px;
    direction: rtl;
  }
  .english-text {
    font-family: var(--font-english);
    font-size: 14px;
    color: var(--text-color);
    line-height: 1.6;
    direction: ltr;
    text-align: left;
    opacity: 0.8;
  }
  .page-number {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--text-color);
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="page" data-page-number="0">
  <div class="page-content">
    <div class="section-title">כותרת הדף</div>
    <div class="hebrew-text">
      טקסט עברי לדוגמה. כאן יופיע תוכן ההגדה בעברית עם ניקוד.
    </div>
    <div class="english-text">
      Sample English text. The Haggadah content will appear here in English translation.
    </div>
  </div>
  <div class="page-number">0</div>
</div>
</body>
</html>
